spring.application.name=legacy_to_modern

# 서버 포트 설정
server.port=8080

# 도커 MySQL 연결 정보
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/legacy_board?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234

# 서버 켤 때마다 SQL 파일 자동 실행
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8